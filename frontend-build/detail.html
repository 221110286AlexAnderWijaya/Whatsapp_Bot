<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Layanan - Estimasi Jasa</title>
    <script src="/_sdk/data_sdk.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    
    <style>@view-transition { navigation: auto; }</style>
</head>
<body>
    <div id="detailPage" class="w-full min-h-screen bg-gray-50 p-8">
        <div class="max-w-6xl mx-auto">
            <button id="backBtn" class="mb-6 text-purple-600 hover:text-purple-700 font-semibold flex items-center gap-2"> ← Kembali ke Pilihan Mobil </button>
            <h2 id="detailTitle" class="text-3xl font-bold mb-6 text-gray-800"></h2>
            <div class="bg-white rounded-lg p-6 shadow-lg mb-6">
    <h3 class="text-2xl font-bold mb-4 text-gray-800">👤 Detail Pelanggan</h3>
    <form id="customerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" id="customerName" placeholder="Nama pelanggan" class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Plat Kendaraan (BK)</label>
            <input type="text" id="customerPlate" placeholder="Contoh: BK 1234 ABC" class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP</label>
            <input type="tel" id="customerPhone" placeholder="08..." class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Catatan Tambahan (Note)</label>
            <textarea id="customerNote" rows="2" placeholder="Detail keluhan atau instruksi khusus" class="w-full px-4 py-3 border rounded-lg"></textarea>
        </div>
    </form>
</div>
            <button id="confirmBtn" class="hidden fixed bottom-8 right-8 text-white px-6 py-4 rounded-full shadow-2xl font-semibold text-lg hover:shadow-3xl transition-all z-40" style="background: linear-gradient(to right, #dc2626, #fbbf24)"> ✓ Konfirmasi & Buat Invoice </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-lg p-6 shadow-lg relative"> 
    <h3 class="text-2xl font-bold mb-4 text-gray-800">🔧 Sparepart</h3>
    
    <div class="relative mb-4 z-50"> 
        <input type="text" id="sparepartSearch" placeholder="Cari nama sparepart atau kode (cth: SP-001)..." 
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-600 focus:border-transparent bg-white">
        
        <div id="sparepartDropdown" class="hidden absolute z-50 w-full bg-white border-2 border-gray-200 rounded-lg mt-1 max-h-48 overflow-y-auto shadow-2xl"></div>
    </div>
    
    <div id="selectedSpareparts" class="space-y-3">
        <div class="text-center py-4 text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat data...</div>
    </div>
</div>
                
                <div class="bg-white rounded-lg p-6 shadow-lg relative">
                    <h3 class="text-2xl font-bold mb-4 text-gray-800">⚙️ Jasa</h3>
                    <div class="relative mb-4 z-50"> 
                        <input type="text" id="jasaSearch" placeholder="Cari jasa..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-600 focus:border-transparent bg-white">
                        
                        <div id="jasaDropdown" class="hidden absolute z-50 w-full bg-white border-2 border-gray-200 rounded-lg mt-1 max-h-48 overflow-y-auto shadow-2xl"></div>
                    </div>
                    <div id="selectedJasa" class="space-y-3">
                        <div class="text-center py-4 text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  
<button id="confirmBtn" 
    class="hidden fixed bottom-8 right-8 text-white px-8 py-4 rounded-full shadow-2xl font-bold text-lg hover:shadow-orange-500/50 hover:-translate-y-1 transition-all duration-300 z-40 flex items-center gap-2" 
    style="background: linear-gradient(to right, #dc2626, #f59e0b)">
    ✓ Konfirmasi Invoice
</button>

<div id="addJasaModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[70] p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl p-8 max-w-md w-full shadow-2xl transform transition-all scale-100 relative">
        <form id="addJasaForm" class="space-y-5">
            <div class="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-200">
    <label class="flex items-center space-x-3 text-sm font-semibold text-blue-700 cursor-pointer">
        <input type="checkbox" id="calculateRateSwitch" checked class="form-checkbox text-red-600 h-5 w-5 rounded">
        <span>Gunakan Perhitungan Rate Detail (Berlaku untuk Durasi)</span>
    </label>
    <p class="text-xs text-blue-500 mt-1">Jika tidak dicentang, Biaya Akhir akan dianggap sebagai Base Rate 100 Mnt.</p>
</div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Jasa / Perbaikan</label> 
                <input type="text" id="newJasaName" required placeholder="Contoh: Las Knalpot" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Durasi (Menit)</label> 
                    <input type="number" id="newJasaDuration" required min="1" value="100" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Biaya Akhir (Rp)</label> 
                    <input type="number" id="newJasaLaborCharge" required min="0" placeholder="Contoh: 300000" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                </div>
            </div>
            
            <div class="pt-2">
                <p class="text-xs text-gray-500 mt-1">Rate Dasar Per 100 Mnt akan dihitung otomatis.</p>
                <p id="calculatedRateDisplay" class="font-bold text-sm text-red-600">Base Rate: Rp 0</p>
            </div>
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeJasaModal()" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition"> Batal </button> 
                <button type="submit" class="flex-1 text-white px-4 py-3 rounded-lg font-bold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5" style="background: linear-gradient(to right, #dc2626, #fbbf24);"> Simpan </button>
            </div>
                
        </form>
    </div>
</div>
    <script src="service.js"></script>
</body>
</html>
