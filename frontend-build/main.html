<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Estimasi Jasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="mainPage" class="w-full min-h-screen relative">
        
        <div class="absolute top-6 left-6 z-50">
            <a href="index.html" class="flex items-center gap-2 bg-white/20 backdrop-blur-md text-white px-4 py-2 rounded-lg font-semibold hover:bg-white/30 transition shadow-lg border border-white/20">
                <i class="fas fa-arrow-left"></i>
                <span>Kembali</span>
            </a>
        </div>

        <div class="gradient-bg w-full text-white p-8 relative overflow-hidden" style="min-height: 300px;">
            <div class="car-placeholder mb-4 text-6xl">🚗</div>
            <h1 id="mainTitle" class="text-4xl font-bold text-center relative z-10">Estimasi Jasa</h1>
        </div>

        <div class="w-full bg-gray-100 p-6">
            <div class="max-w-4xl mx-auto">
                <input type="text" id="searchBar" placeholder="Cari tipe mobil..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-600 focus:border-transparent shadow-sm">
            </div>
        </div>

        <div class="w-full p-8 bg-gray-50" style="min-height: 400px;">
            <div class="max-w-6xl mx-auto">
                <div id="listContainer" class="card-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <script src="service.js"></script>
</body>
</html>
